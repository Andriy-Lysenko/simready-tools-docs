<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simready Tools v2.3 — Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f0f0f0;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
        .container{text-align:center;animation:fadeIn .5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
        h1{color:#ff9800;font-size:2.2rem;margin-bottom:8px}
        .subtitle{color:#888;font-size:1rem;margin-bottom:40px}
        .cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
        .lang-card{background:#181818;border:1px solid #2a2a2a;border-radius:12px;padding:40px 50px;cursor:pointer;transition:.3s;text-decoration:none;color:#f0f0f0;min-width:220px}
        .lang-card:hover{border-color:#ff9800;transform:translateY(-4px);box-shadow:0 8px 30px rgba(255,152,0,.15)}
        .lang-card .flag{font-size:3rem;margin-bottom:12px}
        .lang-card h3{font-size:1.1rem;margin-bottom:4px}
        .lang-card p{color:#888;font-size:.85rem}
        .footer{margin-top:50px;font-size:.75rem;color:#444}
    </style>
</head>
<body>
    <div class="container">
        <h1>Simready Tools v2.3</h1>
        <p class="subtitle">Select documentation language / Выберите язык документации</p>
        <div class="cards">
            <a href="SimreadyTools_Manual_RU.html" class="lang-card">
                <div class="flag">🇷🇺</div>
                <h3>Русский</h3>
                <p>Полное руководство</p>
            </a>
            <a href="SimreadyTools_Manual_EN.html" class="lang-card">
                <div class="flag">🇬🇧</div>
                <h3>English</h3>
                <p>Full User Guide</p>
            </a>
        </div>
        <div class="footer">© Nfinite Pipeline</div>
    </div>
</body>
</html>
